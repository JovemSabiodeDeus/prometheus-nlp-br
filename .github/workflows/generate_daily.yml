name: PROMETHEUS — Daily Dataset Generation

on:
  schedule:
    # Roda todo dia às 03:00 UTC (00:00 BRT)
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Permite rodar manualmente pelo painel do GitHub (para testar)
    inputs:
      modo:
        description: "Modo de execução"
        required: false
        default: "producao"
        type: choice
        options:
          - producao
          - teste

permissions:
  contents: write

jobs:
  gerar-datasets:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. Geração ───────────────────────────────────────────
      - name: Gerar datasets do dia
        run: python generate.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      # ── 4. Verificação de qualidade ──────────────────────────
      - name: Verificar arquivos gerados
        run: |
          COUNT=$(ls datasets/*.jsonl 2>/dev/null | wc -l)
          echo "Arquivos JSONL gerados: $COUNT"
          if [ "$COUNT" -lt "3" ]; then
            echo "ERRO: esperado pelo menos 3 arquivos JSONL"
            exit 1
          fi
          echo "✅ Verificação OK"

      # ── 5. Upload AWS S3 (opcional, se configurado) ──────────
      - name: Upload para AWS S3
        if: env.AWS_ACCESS_KEY_ID != ''
        run: python aws_upload.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET || 'prometheus-datasets-br' }}

      # ── 6. Publica como GitHub Release ───────────────────────
      - name: Criar GitHub Release com os datasets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "dataset-${{ github.run_number }}-${{ github.run_id }}"
          name: "📊 Datasets #${{ github.run_number }} — ${{ github.event.repository.updated_at || 'daily' }}"
          body: |
            ## 🔥 Datasets Gerados Automaticamente — PROMETHEUS

            Geração diária automática de datasets de NLP em português brasileiro.

            ### 📦 Conteúdo desta release:
            - `financial_sentiment_*.jsonl` — Análise de sentimento financeiro (~12.000 exemplos)
            - `legal_ner_*.jsonl` — Named Entity Recognition jurídico (~8.000 exemplos)
            - `customer_service_*.jsonl` — Diálogos de atendimento ao cliente (~8.000 exemplos)

            **Idioma:** Português Brasileiro (pt-BR)
            **Formato:** JSONL (JSON Lines)
            **Total estimado:** ~26.000+ exemplos por dia
            **Qualidade:** Validação automática + deduplicação

            ---
            *Gerado automaticamente pelo sistema PROMETHEUS*
          files: datasets/*.jsonl
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 7. Commit do manifesto ───────────────────────────────
      - name: Commit manifesto atualizado
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "PROMETHEUS Bot"
          git add MANIFEST.json
          git diff --staged --quiet || git commit -m "chore: atualiza manifesto [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
